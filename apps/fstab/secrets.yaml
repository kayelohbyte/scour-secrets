# /etc/fstab — mount table credential options and remote server addresses
# Sources: gitlab-scrubber fstab.go (fstabCredentialsRe + fstabExtractServer)

# CIFS/SMB mount options: password=, username=, domain=, credentials=
# Options field is comma-separated: "username=alice,password=secret,domain=corp"
- kind: regex
  pattern: '(?i)\bpassword=([^,\s"]+)'
  category: custom:password
  label: fstab_mount_password

- kind: regex
  pattern: '(?i)\busername=([^,\s"]+)'
  category: name
  label: fstab_mount_username

- kind: regex
  pattern: '(?i)\bdomain=([^,\s"]+)'
  category: hostname
  label: fstab_mount_domain

- kind: regex
  pattern: '(?i)\bcredentials=([^,\s"]+)'
  category: hostname
  label: fstab_mount_credentials_path

# CIFS/SMB server: //host/share → host (IPv4, IPv6, or hostname).
# `(?m)` is required: fstab has one mount per line, and without it `^` only
# matches the start of the whole file, leaving every mount after the first
# unredacted.
- kind: regex
  pattern: '(?m)^//([^/\s]+)/'
  category: hostname
  label: fstab_cifs_server

# NFS server: host:/export/path → host
- kind: regex
  pattern: '(?m)^([a-zA-Z0-9][a-zA-Z0-9.\-]*):/[^\s]'
  category: hostname
  label: fstab_nfs_server

# (iSCSI/NBD device IPs in the first column are caught by the baseline `ipv4`
# detector, which matches on every line — no fstab-specific rule needed.)

- kind: allow
  values:
    - "defaults"
    - "noatime"
    - "nofail"
    - "auto"
    - "noauto"
    - "ro"
    - "rw"
    - "user"
    - "nouser"
    - "exec"
    - "noexec"
    - "suid"
    - "nosuid"
    - "proc"
    - "tmpfs"
    - "ext4"
    - "ext3"
    - "xfs"
    - "btrfs"
    - "vfat"
    - "ntfs"
    - "nfs"
    - "nfs4"
    - "cifs"
    - "smbfs"
    - "swap"
    - "none"
    - "127.0.0.1"
    - "localhost"
    - "true"
    - "false"
    - "yes"
    - "no"
    - "null"
    - "nil"
    - "0"
    - "1"
    - "0.0.0.0"
    - "::1"
    - "changeme"
    - "example"
    - "sample"
    - "placeholder"
    - "${*}"
    - "{{*}}"
    - "example.com"
    - "example.org"
