# Elasticsearch — API keys, cluster credentials

# Elasticsearch API key (base64-encoded id:api_key, preceded by context keyword)
- kind: regex
  pattern: '(?i)(?:elastic[_-]?(?:search[_-]?)?api[_-]?key|es[_-]?api[_-]?key)[\s:="'']+([A-Za-z0-9+/=]{20,})'
  category: auth_token
  label: elasticsearch_api_key

# Elastic Cloud ID (contains base64-encoded cluster URL)
- kind: regex
  pattern: '(?i)(?:elastic[_-]?cloud[_-]?id|cloud[_-]?id)[\s:="'']+([A-Za-z0-9_:+/=-]{20,})'
  category: auth_token
  label: elastic_cloud_id

- kind: allow
  values:
    - "elasticsearch"
    - "elastic"
    - "elastic.co"
    - "cloud.elastic.co"
    - "localhost:9200"
    - "127.0.0.1:9200"
    - "localhost:5601"
