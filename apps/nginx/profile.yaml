# nginx — nginx.conf, virtual host configs, proxy upstreams, server names
# Access log and error log sensitive fields are covered by secrets.yaml regex patterns.

# `""` is included because nginx vhost files under sites-available/ and
# sites-enabled/ are conventionally extensionless (e.g. `sites-available/default`);
# without it the `.conf` gate skipped them, leaking server_name and proxy targets.
- processor: key-value
  extensions: ["", ".conf"]
  include:
    - "nginx.conf"
    - "conf.d/*.conf"
    - "sites-available/*"
    - "sites-enabled/*"
    - "snippets/*.conf"
    - "nginx/nginx.conf"
    - "nginx/conf.d/*.conf"
  options:
    delimiter: " "
    comment_prefix: "#"
    value_strip_suffix: ";"
  fields:
    - pattern: "server_name"
      category: hostname
      label: nginx_server_name
    - pattern: "proxy_pass"
      category: url
      label: nginx_proxy_pass
    - pattern: "fastcgi_pass"
      category: url
      label: nginx_fastcgi_pass
    - pattern: "uwsgi_pass"
      category: url
      label: nginx_uwsgi_pass
    - pattern: "grpc_pass"
      category: url
      label: nginx_grpc_pass
    - pattern: "set_real_ip_from"
      category: ipv4
      label: nginx_trusted_proxy_ip
    - pattern: "ssl_certificate_key"
      category: file_path
      label: nginx_ssl_key_path
    - pattern: "ssl_certificate"
      category: file_path
      label: nginx_ssl_cert_path
    - pattern: "auth_basic_user_file"
      category: file_path
      label: nginx_htpasswd_path
