# Nginx — access logs, error logs, upstream auth

# Username from failed basic auth
- kind: regex
  pattern: '(?i)\buser\s+"([^"]{1,64})"\s+was\s+not\s+found'
  category: name
  label: nginx_auth_username

# Upstream URL (proxy_pass, fastcgi_pass)
- kind: regex
  pattern: '(?i)upstream:\s*"[a-z][a-z0-9+.-]+://[^\s"''<>]+"'
  category: url
  label: nginx_upstream_url

# Forwarded client IP headers
- kind: regex
  pattern: '(?i)(?:x-real-ip|x-forwarded-for):\s*[\d.,\s:a-fA-F]+'
  category: ipv4
  label: nginx_forwarded_ip

- kind: allow
  values:
    - "nginx"
    - "nginx.conf"
    - "nginx.org"
    - "nginx.com"
    - "localhost"
    - "127.0.0.1"
    - "unix:/var/run/php/php-fpm.sock"
    - "unix:/var/run/fastcgi.sock"
