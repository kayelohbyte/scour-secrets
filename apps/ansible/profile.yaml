# Ansible — group_vars, host_vars, vars/main.yml, vault variables
- processor: yaml
  extensions: [".yml", ".yaml"]
  include:
    - "group_vars/*.yml"
    - "group_vars/*.yaml"
    - "group_vars/**/*.yml"
    - "group_vars/**/*.yaml"
    - "host_vars/*.yml"
    - "host_vars/*.yaml"
    - "host_vars/**/*.yml"
    - "host_vars/**/*.yaml"
    - "vars/main.yml"
    - "vars/main.yaml"
    - "defaults/main.yml"
    - "defaults/main.yaml"
  fields:
    - pattern: "ansible_password"
      category: custom:password
      label: ansible_password
    - pattern: "ansible_become_password"
      category: custom:password
      label: ansible_become_password
    - pattern: "ansible_ssh_pass"
      category: custom:password
      label: ansible_ssh_pass
    # Become/sudo/su password aliases — the `*_password` glob below misses these
    # `*_pass` spellings, which still appear in inventories and older playbooks.
    - pattern: "ansible_become_pass"
      category: custom:password
      label: ansible_become_pass
    - pattern: "ansible_sudo_pass"
      category: custom:password
      label: ansible_sudo_pass
    - pattern: "ansible_su_pass"
      category: custom:password
      label: ansible_su_pass
    - pattern: "vault_password"
      category: auth_token
      label: ansible_vault_password
    - pattern: "*_password"
      category: custom:password
      label: ansible_var_password
      min_length: 8
    - pattern: "*_secret"
      category: auth_token
      label: ansible_var_secret
      min_length: 8
    - pattern: "*_token"
      category: auth_token
      label: ansible_var_token
      min_length: 8
    - pattern: "*_api_key"
      category: auth_token
      label: ansible_var_api_key
      min_length: 8
    - pattern: "*_private_key"
      category: auth_token
      label: ansible_var_private_key
      min_length: 8
