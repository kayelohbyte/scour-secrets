# MongoDB — connection strings with embedded credentials

# mongodb:// and mongodb+srv:// URIs with username:password
- kind: regex
  pattern: '\b(mongodb(?:\+srv)?://[^\s:@/]{3,50}:[^\s:@/]{3,88}@[-.%\w]+(?::\d{1,5})?[^\s"''<>]*)\b'
  category: url
  label: mongodb_connection_uri

- kind: allow
  values:
    - "mongodb"
    - "mongodb.com"
    - "mongodb://localhost"
    - "mongodb://127.0.0.1"
    - "mongodb+srv://localhost"
    - "localhost:27017"
    - "127.0.0.1:27017"
