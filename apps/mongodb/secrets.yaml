# MongoDB — connection strings with embedded credentials
#
# mongodb:// and mongodb+srv:// URIs with `user:pass@` are handled by the
# built-in baseline `credential_url` detector, which redacts only the credential
# and preserves the host/port/db/query for troubleshooting. (A bundle rule here
# would match the whole URI and, winning the longest-match tie, override that
# precision.)

- kind: allow
  values:
    - "mongodb"
    - "mongodb.com"
    - "mongodb://localhost"
    - "mongodb://127.0.0.1"
    - "mongodb+srv://localhost"
    - "localhost:27017"
    - "127.0.0.1:27017"
    - "true"
    - "false"
    - "yes"
    - "no"
    - "null"
    - "none"
    - "nil"
    - "0"
    - "1"
    - "localhost"
    - "127.0.0.1"
    - "0.0.0.0"
    - "::1"
    - "changeme"
    - "example"
    - "sample"
    - "placeholder"
    - "${*}"
    - "{{*}}"
    - "example.com"
    - "example.org"
