# Kubernetes — service account tokens, kubeconfig credentials, workload env vars

# Service account tokens are JWTs — covered by the built-in baseline `jwt`
# detector (more permissive than the k8s-specific shape), which composes
# under --app.

# kubectl describe / get text output: "token: <value>" lines
- kind: regex
  pattern: '(?m)^\s*[Tt]oken:\s+([A-Za-z0-9\-._~+/]{20,})\s*$'
  category: auth_token
  label: k8s_describe_token

# Docker config.json auth value — base64(user:password) inside imagePullSecrets
- kind: regex
  pattern: '"auth"\s*:\s*"([A-Za-z0-9+/]{8,}={0,2})"'
  category: auth_token
  label: k8s_docker_config_auth

# kubectl describe node/pod: InternalIP, ExternalIP, PodIP address lines
- kind: regex
  pattern: '(?i)(?:InternalIP|ExternalIP|PodIP|HostIP):\s+(\d{1,3}(?:\.\d{1,3}){3}|[0-9a-fA-F:]{4,39})'
  category: ipv4
  label: k8s_describe_ip

# kubectl describe pod: image reference line — reveals internal registry
- kind: regex
  pattern: '(?m)^\s+Image:\s+(\S+)\s*$'
  category: url
  label: k8s_describe_image

# field-name signal: high-entropy env var values in Deployment/StatefulSet specs.
# Catches values like DATABASE_URL, API_KEY where the key name is not known
# to the structured profile (it sees only "value", not the sibling "name").
- kind: field-name
  pattern: "^value$"
  category: auth_token
  label: k8s_env_value_signal
  threshold: 4.0

- kind: allow
  values:
    - "kubernetes"
    - "kubectl"
    - "k8s.io"
    - "kubernetes.io"
    - "kubernetes.default"
    - "kubernetes.default.svc"
    - "kubernetes.default.svc.cluster.local"
    - "cluster.local"
    - "kube-system"
    - "default"
    - "true"
    - "false"
    - "yes"
    - "no"
    - "null"
    - "none"
    - "nil"
    - "0"
    - "1"
    - "localhost"
    - "127.0.0.1"
    - "0.0.0.0"
    - "::1"
    - "changeme"
    - "example"
    - "sample"
    - "placeholder"
    - "${*}"
    - "{{*}}"
    - "example.com"
    - "example.org"
    - "00000000-0000-0000-0000-000000000000"
    - "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
    - "aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa"
    - "12345678-1234-1234-1234-123456789abc"
