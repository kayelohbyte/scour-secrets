# AWS CLI — access key IDs, session tokens

# AWS access key IDs (AKIA/ASIA/AROA/…) are covered by the built-in baseline
# `aws_access_key_id` detector, which composes under --app.

# Context-keyed secret access key (40-char base64url-like string)
- kind: regex
  pattern: '(?i)(?:aws_secret_access_key|aws_secret|secret_access_key)[\s:="'']+([A-Za-z0-9+/]{40})\b'
  category: auth_token
  label: aws_secret_access_key

# AWS session token (temporary credentials, long base64 blob)
- kind: regex
  pattern: '(?i)(?:aws_session_token|aws_security_token)[\s:="'']+([A-Za-z0-9+/]{100,}={0,2})'
  category: auth_token
  label: aws_session_token

- kind: allow
  values:
    - "aws"
    - "aws-cli"
    - "amazonaws.com"
    - "aws.amazon.com"
    - "us-east-1"
    - "us-east-2"
    - "us-west-1"
    - "us-west-2"
    - "eu-west-1"
    - "eu-west-2"
    - "eu-west-3"
    - "eu-central-1"
    - "eu-north-1"
    - "ap-southeast-1"
    - "ap-southeast-2"
    - "ap-northeast-1"
    - "ap-northeast-2"
    - "ap-south-1"
    - "ca-central-1"
    - "sa-east-1"
    - "true"
    - "false"
    - "yes"
    - "no"
    - "null"
    - "none"
    - "nil"
    - "0"
    - "1"
    - "localhost"
    - "127.0.0.1"
    - "0.0.0.0"
    - "::1"
    - "changeme"
    - "example"
    - "sample"
    - "placeholder"
    - "${*}"
    - "{{*}}"
    - "example.com"
    - "example.org"
    - "00000000-0000-0000-0000-000000000000"
    - "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
    - "aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa"
    - "12345678-1234-1234-1234-123456789abc"
