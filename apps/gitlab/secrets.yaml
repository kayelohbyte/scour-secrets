# GitLab — CI/CD logs, runner output, .gitlab-ci.yml variables

# Personal access tokens — v2 (glpat- + 20-22 chars)
- kind: regex
  pattern: '\b(glpat-[a-zA-Z0-9\-=_]{20,22})\b'
  category: auth_token
  label: gitlab_personal_token_v2

# Personal access tokens — v3 (new extended format)
- kind: regex
  pattern: '\b(glpat-[a-zA-Z0-9\-=_]{27,300}\.[0-9a-z]{2}\.[a-z0-9]{9})\b'
  category: auth_token
  label: gitlab_personal_token_v3

# CI/CD job token
- kind: regex
  pattern: '\bglcbt-\d{2}-[A-Za-z0-9_-]{20}\b'
  category: auth_token
  label: gitlab_ci_job_token

# Deploy token
- kind: regex
  pattern: '\bgldt-[A-Za-z0-9_-]{20}\b'
  category: auth_token
  label: gitlab_deploy_token

# Feed token
- kind: regex
  pattern: '\bglft-[A-Za-z0-9_-]{20}\b'
  category: auth_token
  label: gitlab_feed_token

# Runner authentication token
- kind: regex
  pattern: '\bglrt-[A-Za-z0-9_-]{20}\b'
  category: auth_token
  label: gitlab_runner_token

# SCIM token
- kind: regex
  pattern: '\bglsoat-[A-Za-z0-9_-]{20}\b'
  category: auth_token
  label: gitlab_scim_token

# GitLab Agent token
- kind: regex
  pattern: '\bglagent-[A-Za-z0-9_-]{50,}\b'
  category: auth_token
  label: gitlab_agent_token

# Generic context-keyed GitLab secret
- kind: regex
  pattern: '(?i)(?:gitlab_secret|gitlab_token|gl_token)[\s:="'']+[A-Za-z0-9_-]{20,}'
  category: auth_token
  label: gitlab_oauth_secret

- kind: allow
  values:
    - "gitlab"
    - "gitlab.com"
    - "gitlab-ci"
    - "gitlab-ci.yml"
    - ".gitlab-ci.yml"
