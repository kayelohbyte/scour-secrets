# Terraform — Terraform Cloud personal tokens, Atlas tokens

# Terraform Cloud / Atlas personal token
- kind: regex
  pattern: '\b([A-Za-z0-9]{14}\.atlasv1\.[A-Za-z0-9]{67})\b'
  category: auth_token
  label: terraform_cloud_token

- kind: allow
  values:
    - "terraform"
    - "terraform.io"
    - "registry.terraform.io"
    - "app.terraform.io"
    - "releases.hashicorp.com"
