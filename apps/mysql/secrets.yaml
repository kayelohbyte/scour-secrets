# MySQL / MariaDB — connection strings with embedded credentials
#
# mysql:// URIs with `user:pass@` are handled by the built-in baseline
# `credential_url` detector, which redacts only the credential and preserves the
# host/port/db/query for troubleshooting. (A bundle rule here would match the
# whole URI and, winning the longest-match tie, override that precision.)

- kind: allow
  values:
    - "mysql"
    - "mariadb"
    - "mysql.com"
    - "mariadb.org"
    - "localhost:3306"
    - "127.0.0.1:3306"
    - "mysql://localhost"
    - "mysql://127.0.0.1"
    - "true"
    - "false"
    - "yes"
    - "no"
    - "null"
    - "none"
    - "nil"
    - "0"
    - "1"
    - "localhost"
    - "127.0.0.1"
    - "0.0.0.0"
    - "::1"
    - "changeme"
    - "example"
    - "sample"
    - "placeholder"
    - "${*}"
    - "{{*}}"
    - "example.com"
    - "example.org"
