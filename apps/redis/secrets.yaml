# Redis — connection strings with embedded password
#
# redis:// and rediss:// URIs with `user:pass@` are handled by the built-in
# baseline `credential_url` detector (redacts only the credential, preserves
# host/port/path). The Azure form `host.redis.cache.windows.net:port,password=…,
# ssl=True` is handled by the baseline `password_kv` detector, which redacts
# only the password value and preserves `,ssl=True`. Both compose under --app
# and redact more precisely than a whole-string bundle rule would.

- kind: allow
  values:
    - "redis"
    - "redis.io"
    - "redis://localhost"
    - "redis://127.0.0.1"
    - "rediss://localhost"
    - "localhost:6379"
    - "127.0.0.1:6379"
    - "true"
    - "false"
    - "yes"
    - "no"
    - "null"
    - "none"
    - "nil"
    - "0"
    - "1"
    - "localhost"
    - "127.0.0.1"
    - "0.0.0.0"
    - "::1"
    - "changeme"
    - "example"
    - "sample"
    - "placeholder"
    - "${*}"
    - "{{*}}"
    - "example.com"
    - "example.org"
