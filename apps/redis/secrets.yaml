# Redis — connection strings with embedded password

# redis:// and rediss:// URIs with password
- kind: regex
  pattern: '\brediss?://[^\s:@/]{3,50}:[^\s:@/]{3,50}@[-.%\w\/:]+\b'
  category: url
  label: redis_connection_uri

# Azure Redis connection string format
- kind: regex
  pattern: '\b([\w\d.-]{1,100}\.redis\.cache\.windows\.net:\d+),password=([^,]{20,}),ssl=True'
  category: url
  label: azure_redis_connection

- kind: allow
  values:
    - "redis"
    - "redis.io"
    - "redis://localhost"
    - "redis://127.0.0.1"
    - "rediss://localhost"
    - "localhost:6379"
    - "127.0.0.1:6379"
