# Redis — redis.conf authentication passwords, Sentinel auth
- processor: key-value
  extensions: [".conf"]
  include: ["redis.conf", "redis-*.conf", "sentinel.conf", "redis-sentinel.conf",
            "redis-server.conf", "conf.d/redis.conf"]
  options:
    delimiter: " "
    comment_prefix: "#"
  fields:
    - pattern: "requirepass"
      category: custom:password
      label: redis_requirepass
    - pattern: "masterauth"
      category: custom:password
      label: redis_masterauth

- processor: env
  extensions: [".env"]
  include: [".env", ".env.local", ".env.production", ".env.staging",
            ".env.development", ".env.test", "*.env"]
  fields:
    - pattern: "REDIS_PASSWORD"
      category: custom:password
      label: redis_password
    # REDIS_URL (redis://:pass@host) is handled by the baseline `credential_url`
    # detector (redacts only the password, preserves host/port/db).
    - pattern: "REDIS_TLS_CERT"
      category: auth_token
      label: redis_tls_cert
    - pattern: "REDIS_TLS_KEY"
      category: auth_token
      label: redis_tls_key
