# Ruby on Rails — database.yml, .env, config/secrets.yml
- processor: yaml
  extensions: [".yaml", ".yml"]
  include: ["database.yml", "database.yaml"]
  fields:
    - pattern: "*.password"
      category: custom:password
      label: rails_db_password
      min_length: 8
    - pattern: "*.username"
      category: name
      label: rails_db_username
    - pattern: "*.host"
      category: hostname
      label: rails_db_host
    - pattern: "*.url"
      category: url
      label: rails_db_url

- processor: yaml
  extensions: [".yaml", ".yml"]
  include: ["secrets.yml", "secrets.yaml"]
  fields:
    - pattern: "*.secret_key_base"
      category: auth_token
      label: rails_secret_key_base
      min_length: 8
    - pattern: "*.secret_token"
      category: auth_token
      label: rails_secret_token
      min_length: 8
    - pattern: "*.devise_secret_key"
      category: auth_token
      label: rails_devise_secret
      min_length: 8
    - pattern: "*.aws_access_key_id"
      category: auth_token
      label: aws_access_key_id
      min_length: 8
    - pattern: "*.aws_secret_access_key"
      category: auth_token
      label: aws_secret_access_key
      min_length: 8
    - pattern: "*.stripe_secret_key"
      category: auth_token
      label: stripe_secret_key
      min_length: 8
    - pattern: "*.jwt_secret"
      category: auth_token
      label: rails_jwt_secret
      min_length: 8
    - pattern: "*.jwt_key"
      category: auth_token
      label: rails_jwt_key
      min_length: 8

- processor: env
  extensions: [".env"]
  include: [".env", ".env.local", ".env.production", ".env.staging",
            ".env.development", ".env.test", "*.env"]
  fields:
    - pattern: "SECRET_KEY_BASE"
      category: auth_token
      label: rails_secret_key_base
    # DATABASE_URL / REDIS_URL connection strings are handled by the baseline
    # `credential_url` detector (redacts only the credential, preserves host).
    - pattern: "*PASSWORD"
      category: custom:password
      label: env_password
      min_length: 8
    - pattern: "*SECRET"
      category: auth_token
      label: env_secret
      min_length: 8
    - pattern: "*_KEY"
      category: auth_token
      label: env_key
      min_length: 8
    - pattern: "*TOKEN"
      category: auth_token
      label: env_token
      min_length: 8
    - pattern: "AWS_ACCESS_KEY_ID"
      category: auth_token
      label: aws_access_key_id
    - pattern: "AWS_SECRET_ACCESS_KEY"
      category: auth_token
      label: aws_secret_access_key
