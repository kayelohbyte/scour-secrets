# Grafana — service account tokens, API keys

# Cloud access token (glc_eyJ = base64 JWT prefix)
- kind: regex
  pattern: '\b(glc_eyJ[A-Za-z0-9+\/=]{60,160})\b'
  category: auth_token
  label: grafana_cloud_token

# Service account token (glsa_ prefix)
- kind: regex
  pattern: '\b(glsa_[a-zA-Z0-9]{32}_[a-fA-F0-9]{8})\b'
  category: auth_token
  label: grafana_service_account_token

- kind: allow
  values:
    - "grafana"
    - "grafana.com"
    - "grafana.net"
    - "localhost:3000"
    - "127.0.0.1:3000"
