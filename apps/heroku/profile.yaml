# Heroku — app.json env values, .env add-on credentials, .buildpacks private repo URLs
- processor: json
  extensions: [".json"]
  include: ["app.json"]
  fields:
    # env.*.value — actual secret values committed to app.json
    - pattern: "env.*.value"
      category: auth_token
      label: heroku_app_json_env_value
    # env.*.default — some fields use "default" instead of "value"
    - pattern: "env.*.default"
      category: auth_token
      label: heroku_app_json_env_default

- processor: env
  extensions: [".env"]
  include: [".env", ".env.local", ".env.production", ".env.staging",
            ".env.development", ".env.test", "*.env"]
  fields:
    # Connection-string URLs (DATABASE_URL, JDBC_DATABASE_URL, REDIS_URL,
    # HEROKU_REDIS_*_URL, CLOUDINARY_URL, BONSAI_URL) are handled by the baseline
    # `credential_url` / `password_kv` detectors, which redact only the embedded
    # credential and preserve host/port/db for troubleshooting. The explicit
    # JDBC username/password env vars below are kept (they're not URLs).
    - pattern: "JDBC_DATABASE_USERNAME"
      category: name
      label: heroku_jdbc_db_user
    - pattern: "JDBC_DATABASE_PASSWORD"
      category: custom:password
      label: heroku_jdbc_db_password
    # Rails master key (often stored in Heroku config vars)
    - pattern: "RAILS_MASTER_KEY"
      category: auth_token
      label: rails_master_key
    # Cloudinary URL (cloudinary://key:secret@cloud) — baseline credential_url.
    # SendGrid
    - pattern: "SENDGRID_API_KEY"
      category: auth_token
      label: sendgrid_api_key
    - pattern: "SENDGRID_PASSWORD"
      category: custom:password
      label: sendgrid_password
    - pattern: "SENDGRID_USERNAME"
      category: name
      label: sendgrid_username
    # Mailgun
    - pattern: "MAILGUN_API_KEY"
      category: auth_token
      label: mailgun_api_key
    - pattern: "MAILGUN_SMTP_PASSWORD"
      category: custom:password
      label: mailgun_smtp_password
    - pattern: "MAILGUN_SMTP_LOGIN"
      category: name
      label: mailgun_smtp_login
    # New Relic
    - pattern: "NEW_RELIC_LICENSE_KEY"
      category: auth_token
      label: new_relic_license_key
    # Rollbar
    - pattern: "ROLLBAR_ACCESS_TOKEN"
      category: auth_token
      label: rollbar_access_token
    # Sentry (DSN contains key material)
    - pattern: "SENTRY_DSN"
      category: url
      label: sentry_dsn
    # Papertrail
    - pattern: "PAPERTRAIL_API_TOKEN"
      category: auth_token
      label: papertrail_api_token
    # Algolia
    - pattern: "ALGOLIA_API_KEY"
      category: auth_token
      label: algolia_api_key
    - pattern: "ALGOLIA_SEARCH_KEY"
      category: auth_token
      label: algolia_search_key
    # Scout APM
    - pattern: "SCOUT_KEY"
      category: auth_token
      label: scout_apm_key
    # Bonsai Elasticsearch URL (https://user:pass@host) — baseline credential_url.
