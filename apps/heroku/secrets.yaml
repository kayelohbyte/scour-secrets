# Heroku — API keys and auth tokens

# v2 token (HRKU-AA prefix + 58 alphanumeric chars)
- kind: regex
  pattern: '\b(HRKU-AA[0-9a-zA-Z_-]{58})\b'
  category: auth_token
  label: heroku_token_v2

# v1 token (UUID format with heroku context keyword)
- kind: regex
  pattern: '(?i)(?:heroku)[\s:="'']+\b([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})\b'
  category: auth_token
  label: heroku_token_v1

- kind: allow
  values:
    - "heroku"
    - "herokuapp.com"
    - "api.heroku.com"
    - "heroku.com"
    - "heroku-cli"
