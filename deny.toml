# Supply-chain security policy for rust-sanitize.
# Run with: cargo deny check

[advisories]
version = 2

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",

    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "Unlicense",

    "ISC",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
