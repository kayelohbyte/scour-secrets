name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: scour-secrets

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            native: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            native: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            # macos-latest runners are arm64; x86_64 binary requires Rosetta
            native: false
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            native: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            native: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Smoke test (Unix)
        if: matrix.native && runner.os != 'Windows'
        run: ./target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} --version

      - name: Smoke test (Windows)
        if: matrix.native && runner.os == 'Windows'
        shell: pwsh
        run: .\target\${{ matrix.target }}\release\${{ env.BINARY_NAME }}.exe --version

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ${{ env.BINARY_NAME }}
          cd ../../..

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" -DestinationPath "${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Generate checksum (Unix)
        if: runner.os != 'Windows'
        run: sha256sum ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.* > ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.sha256

      - name: Generate checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.zip" | Out-File -Encoding utf8 "${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.*

  build-mcp:
    name: Build MCP ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            binary: scour-secrets-mcp
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            binary: scour-secrets-mcp
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            binary: scour-secrets-mcp
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            binary: scour-secrets-mcp.exe

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.3.3

      - name: Compile
        run: >
          deno compile
          --allow-run --allow-env --allow-read --allow-write
          --target ${{ matrix.target }}
          --output ${{ matrix.binary }}
          mcp/src/index.ts

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: tar czf scour-secrets-mcp-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ${{ matrix.binary }}

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path "${{ matrix.binary }}" -DestinationPath "scour-secrets-mcp-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Generate checksum (Unix)
        if: runner.os != 'Windows'
        run: sha256sum scour-secrets-mcp-${{ github.ref_name }}-${{ matrix.target }}.* > scour-secrets-mcp-${{ github.ref_name }}-${{ matrix.target }}.sha256

      - name: Generate checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "scour-secrets-mcp-${{ github.ref_name }}-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  scour-secrets-mcp-${{ github.ref_name }}-${{ matrix.target }}.zip" | Out-File -Encoding utf8 "scour-secrets-mcp-${{ github.ref_name }}-${{ matrix.target }}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mcp-${{ matrix.target }}
          path: scour-secrets-mcp-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: [build, build-mcp]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

  gitlab-release:
    name: Publish to GitLab
    needs: [build, build-mcp]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Upload artifacts and create GitLab Release
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_REPO: ${{ secrets.GITLAB_REPO }}
          TAG: ${{ github.ref_name }}
        run: |
          # Derive the URL-encoded project path from the mirror remote URL.
          # GITLAB_REPO is e.g. "gitlab.com/kayelohbyte/scour-secrets.git"
          PROJECT_PATH=$(echo "$GITLAB_REPO" \
            | sed 's|https\?://||' \
            | sed 's|gitlab\.com/||' \
            | sed 's|\.git$||')
          ENCODED=$(python3 -c \
            "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" \
            "$PROJECT_PATH")
          API="https://gitlab.com/api/v4/projects/${ENCODED}"

          # Upload all artifacts in parallel (up to 4 concurrent).
          pids=()
          for f in artifacts/*; do
            filename=$(basename "$f")
            echo "Uploading $filename …"
            curl --fail --silent --show-error \
              --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
              --upload-file "$f" \
              "${API}/packages/generic/scour-secrets/${TAG}/${filename}" &
            pids+=($!)
          done
          failed=0
          for pid in "${pids[@]}"; do
            wait "$pid" || failed=1
          done
          [ "$failed" -eq 0 ]

          # Build the asset-links JSON array for the release.
          LINKS="["
          first=true
          for f in artifacts/*; do
            filename=$(basename "$f")
            url="${API}/packages/generic/scour-secrets/${TAG}/${filename}"
            [ "$first" = true ] && first=false || LINKS+=","
            LINKS+=$(printf '{"name":"%s","url":"%s","link_type":"package"}' \
              "$filename" "$url")
          done
          LINKS+="]"

          # Create the GitLab release (idempotent: delete first if it exists).
          curl --silent --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
            --request DELETE "${API}/releases/${TAG}" || true

          curl --fail --silent --show-error \
            --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
            --header "Content-Type: application/json" \
            --data "{
              \"name\": \"${TAG}\",
              \"tag_name\": \"${TAG}\",
              \"description\": \"See [GitHub Release](https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}) for full release notes.\",
              \"assets\": { \"links\": ${LINKS} }
            }" \
            "${API}/releases"

          echo "GitLab release ${TAG} published."
