name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  changes:
    name: Change detection
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      mcp: ${{ steps.filter.outputs.mcp }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - '**/*.rs'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - '.github/workflows/**'
              - 'deny.toml'
              - 'fuzz/**'
            mcp:
              - 'mcp/**'
              - 'src/**'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - '.github/workflows/**'

  check:
    name: Check (MSRV 1.86)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: github.event_name != 'schedule' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.code == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.86"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets

  feature-matrix:
    name: Features (${{ matrix.features == '' && 'core' || matrix.features }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: github.event_name != 'schedule' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.code == 'true')
    strategy:
      fail-fast: false
      matrix:
        # Prove every feature combination compiles cleanly. Plain `cargo clippy`
        # (not --all-targets) builds the lib plus any bin whose required-features
        # are satisfied — so the `scour-secrets` binary is only built for `cli`, and
        # the integration tests (which use gated types) are not compiled here.
        features:
          - ""                    # core library only (--no-default-features)
          - "archive"
          - "structured"
          - "archive,structured"
          - "cli"                 # full CLI binary (implies archive + structured)
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --no-default-features --features "${{ matrix.features }}" -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    needs: changes
    if: github.event_name != 'schedule' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.code == 'true')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test
      - run: cargo test --doc

  msrv-test:
    name: Test (MSRV 1.86)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: github.event_name != 'schedule' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.code == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.86"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test
      - run: cargo test --doc

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: github.event_name != 'schedule' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.code == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: github.event_name != 'schedule' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.code == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  mcp-test:
    name: MCP server tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: github.event_name != 'schedule' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.mcp == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.3.3
      # The server shells out to the `scour-secrets` binary; build it first.
      - run: cargo build --release --bin scour-secrets
      - name: Typecheck
        working-directory: mcp
        run: deno task check
      - name: Run MCP test suite
        working-directory: mcp
        run: deno task test
        env:
          SCOUR_SECRETS_BIN: ${{ github.workspace }}/target/release/scour-secrets

  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: github.event_name != 'schedule' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.code == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: |
          cargo fmt --all -- --check
          cargo fmt --manifest-path fuzz/Cargo.toml --all -- --check
      - name: Show rustfmt diff on failure
        if: failure()
        run: |
          cargo fmt --all
          cargo fmt --manifest-path fuzz/Cargo.toml --all
          git --no-pager diff -- src fuzz || true
          exit 1

  deny:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  fuzz:
    name: Fuzz targets
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@v2
      - name: Cache cargo-fuzz
        uses: actions/cache@v4
        id: fuzz-cache
        with:
          path: ~/.cargo/bin/cargo-fuzz
          key: cargo-fuzz-${{ runner.os }}-${{ hashFiles('fuzz/Cargo.toml') }}
          restore-keys: cargo-fuzz-${{ runner.os }}-
      - name: Install cargo-fuzz
        if: steps.fuzz-cache.outputs.cache-hit != 'true'
        # cargo-fuzz 0.13.1 depends on rustix 0.36.x which uses rustc-internal
        # attributes that newer nightly compilers reject.  Install with stable
        # (which still accepts them) — only the fuzz runs themselves need nightly.
        run: cargo +stable install cargo-fuzz --locked --force
      - run: cargo +nightly fuzz build
      - name: Run fuzz targets
        run: |
          cargo +nightly fuzz list | while IFS= read -r target; do
            echo "Fuzzing $target …"
            cargo +nightly fuzz run "$target" -- -max_total_time=30
          done

  fuzz-smoke:
    name: Fuzz smoke (PR)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: >
      github.event_name == 'pull_request' &&
      needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@v2
      - name: Cache cargo-fuzz
        uses: actions/cache@v4
        id: fuzz-cache
        with:
          path: ~/.cargo/bin/cargo-fuzz
          key: cargo-fuzz-${{ runner.os }}-${{ hashFiles('fuzz/Cargo.toml') }}
          restore-keys: cargo-fuzz-${{ runner.os }}-
      - name: Install cargo-fuzz
        if: steps.fuzz-cache.outputs.cache-hit != 'true'
        run: cargo +stable install cargo-fuzz --locked --force
      - run: cargo +nightly fuzz build
      - name: Run fuzz targets (smoke)
        run: |
          cargo +nightly fuzz list | while IFS= read -r target; do
            echo "Fuzzing $target …"
            cargo +nightly fuzz run "$target" -- -max_total_time=10
          done
